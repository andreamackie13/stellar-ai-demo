  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rgba(255,255,255,.16);border-radius:3px} ::-webkit-scrollbar-track{background:transparent}\n  /* Rail hover tooltip (Tooltip Pop — mint spring). Parent-hover reveal can't be inline. */\n  .rail-item{position:relative;display:flex}\n  .rail-tip{position:absolute;left:calc(100% + 14px);top:50%;white-space:nowrap;background:#d4e84f;color:#1c2200;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;padding:6px 11px;border-radius:8px;box-shadow:0 8px 20px rgba(0,0,0,.4);pointer-events:none;z-index:45;transform-origin:left center;opacity:0;transform:translateY(-50%) translateX(-6px) scale(.85);transition:opacity .2s, transform .36s cubic-bezier(.2,1.5,.4,1)}\n  .rail-arrow{position:absolute;left:calc(100% + 8px);top:50%;border:6px solid transparent;border-right-color:#d4e84f;pointer-events:none;z-index:45;opacity:0;transform:translateY(-50%);transition:opacity .2s}\n  .rail-item:hover .rail-tip{opacity:1;transform:translateY(-50%) translateX(0) scale(1)}\n  .rail-item:hover .rail-arrow{opacity:1}\n  @media (prefers-reduced-motion:reduce){.rail-tip{transition:opacity .12s}}\n  .ws-wrap{position:relative;display:inline-flex}\n  .ws-tip{position:absolute;bottom:calc(100% + 8px);right:0;white-space:nowrap;background:#0abab8;color:#04211f;font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;padding:5px 9px;border-radius:7px;box-shadow:0 8px 20px rgba(0,0,0,.45);pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .18s,transform .18s;z-index:50}\n  .ws-wrap:hover .ws-tip{opacity:1;transform:translateY(0)}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<section style=\"padding:46px 52px 70px;background:#050505;min-height:100vh;box-sizing:border-box\">\n\n  <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:6px\">\n    <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;color:#f2f2f0;letter-spacing:-.01em\">Property Ops Command Center<\u002Fdiv>\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:#5f5f5b\">CONCEPT H · FLEET SUITE<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"font-family:'Barlow',sans-serif;font-size:14px;color:#8a8a86;max-width:900px;margin-bottom:30px\">One page, four screens — click the left rail to switch between the owner Operations view, Vendor overview, Vendor analytics, and the Issue node flow. Reference as <a href=\"#h\" style=\"color:#d4e84f;text-decoration:none\">H<\u002Fa>.<\u002Fdiv>\n\n  <div style=\"display:flex;gap:56px;flex-wrap:wrap;align-items:flex-start\">\n\n    <div id=\"h\" style=\"position:relative\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:2px;color:#1c2200;background:#d4e84f;padding:4px 10px;border-radius:2px\">H<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center\">\n          <span data-cc=\"scramble-src\" style=\"position:absolute;width:0;height:0;overflow:hidden;opacity:0;pointer-events:none\">{{ screenLabel }}<\u002Fspan>\n          <span data-cc=\"scramble-out\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:3px;color:#8a8a86\">{{ screenLabel }}<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"width:1680px;height:1050px;overflow:hidden;position:relative;background:linear-gradient(150deg,#000000 0%,#0c0c0c 45%,#181818 100%);border:1px solid rgba(255,255,255,.1);border-radius:16px;font-family:'Barlow',sans-serif;color:#f2f2f0;display:flex;box-shadow:0 30px 90px rgba(0,0,0,.75)\">\n\n        <!-- ===== RAIL ===== -->\n        <div style=\"width:62px;flex:none;margin:16px 6px 16px 16px;background:#141416;border:1px solid rgba(255,255,255,.1);border-radius:20px;display:flex;flex-direction:column;align-items:center;padding:16px 0;box-shadow:0 16px 38px rgba(0,0,0,.5)\">\n          <div style=\"width:38px;height:38px;border-radius:11px;background:#d4e84f;display:flex;align-items:center;justify-content:center;margin-bottom:22px;box-shadow:0 6px 18px rgba(212,232,79,.3)\">\n            <span style=\"color:#1c2200;font-size:22px;font-weight:700;line-height:1\">+<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ rail }}\" as=\"r\" hint-placeholder-count=\"6\">\n              <div class=\"rail-item\">\n                <div onclick=\"{{ r.onClick }}\" style=\"{{ r.style }}\" aria-label=\"{{ r.name }}\">{{ r.icon }}<\u002Fdiv>\n                <div class=\"rail-arrow\"><\u002Fdiv>\n                <div class=\"rail-tip\">{{ r.name }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:auto;display:flex;flex-direction:column;gap:12px;align-items:center\">\n            <div style=\"width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#6f6f6b\">{{ icoHelp }}<\u002Fdiv>\n            <div style=\"width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#6f6f6b\">{{ icoGear }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ===== MAIN ===== -->\n        <div style=\"flex:1;min-width:0;display:flex;flex-direction:column\">\n\n          <!-- TOP BAR -->\n          <div style=\"flex:none;padding:16px 24px 0;display:flex;align-items:center;justify-content:space-between\">\n            <div style=\"display:flex;align-items:center;gap:9px\">\n              <sc-for list=\"{{ chips }}\" as=\"c\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\">\n                  <span style=\"color:#7f7f7b;display:inline-flex\">{{ c.icon }}<\u002Fspan>\n                  <span style=\"font-family:'Barlow';font-size:12px;color:#9a     <!-- =========================== OPERATIONS BOARD =========================== -->\n            <sc-if value=\"{{ isBoard }}\" hint-placeholder-val=\"{{ false }}\">\n              <div>\n                <div style=\"margin-bottom:16px\">\n                  <div style=\"display:flex;align-items:center;gap:11px\">\n                    <div style=\"width:4px;height:24px;border-radius:2px;background:#0abab8\"><\u002Fdiv>\n                    <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px;letter-spacing:-.01em\">Operations Board<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-family:'Barlow';font-size:13px;color:#8a8a86;margin-top:5px;padding-left:15px\">Task management board — every work order, all the way through closeout.<\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:16px;flex-wrap:wrap\">\n                  <div style=\"display:flex;gap:2px;background:#1c1c20;border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:3px\">\n                    <div style=\"padding:7px 14px;border-radius:8px;background:#2f3037;font-family:'Barlow';font-weight:600;font-size:12.5px;color:#f2f2f0\">Work Orders<\u002Fdiv>\n                    <div style=\"padding:7px 14px;font-family:'Barlow';font-size:12.5px;color:#8a8a86\">Maintenance<\u002Fdiv>\n                    <div style=\"padding:7px 14px;font-family:'Barlow';font-size:12.5px;color:#8a8a86\">Compliance<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:2px;background:#1c1c20;border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:3px\">\n                    <div style=\"padding:7px 13px;border-radius:8px;background:#2f3037;font-family:'Barlow';font-weight:600;font-size:12.5px;color:#f2f2f0\">Board<\u002Fdiv>\n                    <div style=\"padding:7px 13px;font-family:'Barlow';font-size:12.5px;color:#8a8a86\">List<\u002Fdi }}<\u002Fspan><\u002Fdiv>\n                      <\u002Fsc-for>\n                      <div style=\"display:flex;align-items:center;gap:9px;margin-top:2px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)\"><span style=\"display:inline-flex\"><svg width=\"12\" height=\"15\" viewBox=\"0 0 24 34\"><path d=\"M12 0 C5.4 0 0 5.2 0 11.7 C0 20.5 12 34 12 34 C12 34 24 20.5 24 11.7 C24 5.2 18.6 0 12 0 Z\" fill=\"#34d399\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-family:'Barlow';font-size:12px;color:#c8c8c4\">Priority store location<\u002Fspan><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <!-- needs attention panel -->\n                  <div style=\"position:absolute;right:16px;top:14px;bottom:16px;width:296px;border-radius:14px;background:rgba(9,10,13,.8);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(9px);z-index:20;display:flex;flex-direction:column;overflow:hidden\">\n                    <div style=\"padding:15px 16px 12px;border-bottom:1px solid rgba(255,255,255,.08)\">\n                      <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"display:inline-flex;color:#ff5c5c\">{{ icoAlert }}<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:600;font-size:15px\">Needs Attention<\u002Fspan><\u002Fdiv>\n                      <div style=\"font-family:'Barlow';font-size:11px;color:#8a8a86;margin-top:3px\">Highest-load regions, dispatch first<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"flex:1;min-height:0;overflow-y:auto;padding:8px\">\n                      <sc-for list=\"{{ attention }}\" as=\"a\" hint-placeholder-count=\"5\">\n                        <div style=\"display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:11px;margin-bottom:4px;cursor:pointer\" style-hover=\"background:rgba(255,255,255,.04)\">\n                          <span style=\"{{ a.dot }}\"><\u002Fspan>\n                          <div s an>\n                    <span style=\"font-family:'Barlow';font-size:13px;color:#8a8a86;padding-bottom:11px\">▤ Workload<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:16px;align-items:flex-start\">\n                  <sc-for list=\"{{ columns }}\" as=\"col\" hint-placeholder-count=\"3\">\n                    <div style=\"flex:1;min-width:0;border-radius:18px;background:{{ col.bg }};border:1px solid rgba(255,255,255,.06);padding:16px\">\n                      <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\"><span style=\"width:11px;height:11px;border-radius:3px;background:{{ col.color }}\"><\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:600;font-size:15px\">{{ col.title }}<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8a8a86;background:rgba(255,255,255,.06);border-radius:8px;padding:1px 7px\">{{ col.count }}<\u002Fspan><\u002Fdiv>\n                      <div style=\"font-family:'Barlow';font-size:10.5px;color:#6f6f6b;margin-bottom:12px\">{{ col.sub }}<\u002Fdiv>\n                      <div style=\"display:flex;flex-direction:column;gap:11px\">\n                        <sc-for list=\"{{ col.cards }}\" as=\"v\" hint-placeholder-count=\"3\">\n                          <div onclick=\"{{ v.toggle }}\" style=\"border-radius:14px;background:#1c1c20;border:1px solid rgba(255,255,255,.06);padding:13px 14px;cursor:pointer\" style-hover=\"border-color:rgba(255,255,255,.16);background:#202126\">\n                            <div style=\"display:flex;align-items:flex-start;gap:11px\">\n                              <div style=\"width:44px;height:44px;border-radius:11px;position:relative;flex:none;overflow:hidden;background:#141416\">{{ v.avatar }}<span style=\"position:absolute;right:-1px;bottom:-1px;width:12px;height:12px;border-radius:50%;background:{{ col.color }};border:2px solid #1c1c20\"><\u002Fspan><\u002Fdiv>\n "ws-wrap\" onclick=\"{{ v.openVendorEdit }}\" style=\"width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#9a9a96;cursor:pointer\" style-hover=\"border-color:rgba(255,255,255,.25);color:#f2f2f0\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M11.4 2.6 a1.4 1.4 0 0 1 2 2 L5.6 12.4 L2.8 13.2 L3.6 10.4 Z\"><\u002Fpath><\u002Fsvg><span class=\"ws-tip\">Edit vendor<\u002Fspan><\u002Fspan><div style=\"width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#9a9a96\">{{ icoPhone }}<\u002Fdiv><span style=\"font-family:'Barlow';font-size:12px;color:#7f7f7b\">{{ v.caret }}<\u002Fspan><\u002Fdiv>\n                            <\u002Fdiv>\n                            <sc-if value=\"{{ v.closed }}\" hint-placeholder-val=\"{{ true }}\">\n                            <div style=\"display:flex;align-items:center;gap:8px;margin-top:12px\">\n                              <span style=\"display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;background:rgba(255,255,255,.04);font-family:'IBM Plex Mono',monospace;font-size:10px;color:#c8c8c4\">{{ icoClock }} {{ v.hrs }}<\u002Fspan>\n                              <span style=\"display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;background:rgba(255,255,255,.04);font-family:'IBM Plex Mono',monospace;font-size:10px;color:#c8c8c4\">{{ icoJobs }} {{ v.jobs }}<\u002Fspan>\n                              <span style=\"display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;background:rgba(255,255,255,.04);font-family:'IBM Plex Mono',monospace;font-size:10px;color:#f5c14e\">★ {{ v.rating }}<\u002Fspan>\n                            <\u002Fdiv>\n                            <\u002Fsc-if>\n             <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { screen:'board', openWO:null, menuOpen:false, mapLight:false, mapGroup:true, mapFilters:{}, recFilter:null, recTab:'All', recLimit:8, openPermit:null, openProblem:false, expandedVendor:null, vendorTab:'vendors',\n    vendorCrew: {\n      'Inncomm': [ { name:'Marcus Lee', phone:'(713) 555-0192', email:'marcus@inncomm.co', active:true }, { name:'Dana Ruiz', phone:'(713) 555-0148', email:'dana@inncomm.co', active:true } ],\n      'Roots Plumbing': [ { name:'Sam Okafor', phone:'(281) 555-0173', email:'sam@rootsplumbing.co', active:true } ],\n    },\n    crewDraft: {}, crewEditing: null, crewEditDraft: { name:'', phone:'', email:'' },\n    vendorLocs: {\n      'Inncomm': [ 'SS-014 · Katy', 'SS-032 · Sugar Land', 'SS-051 · Downtown' ],\n      'Roots Plumbing': [ 'SS-007 · Heights', 'SS-088 · Pearland' ],\n      'JL Tech': [ 'SS-021 · Memorial' ],\n      'Severo Colchado Electric': [ 'SS-045 · Galleria', 'SS-063 · Bellaire' ],\n    },\n    locManage: null, locDraft: {},\n    vendorEditing: null, vendorEditIsTech: false, vendorEditDraft: { first:'', last:'', email:'', name:'', company:'', phone:'' }, vendorEdits: {}, vendorPwSent: null };\n\n  _crewInitials(s){ return (s||'').trim().split(/\\s+/).map(w => w[0] || '').slice(0,2).join('').toUpperCase() || '?'; }\n\n  // ---- animation layer (count-up, scramble, chart draw, bar grow) ----\n  // Driven by a MutationObserver on the React-bound label node: a screen change always\n  // changes the label text, which reliably fires every entrance animation — no reliance\n  // on lifecycle-hook timing (unreliable in this runtime).\n  componentDidMount(){\n    this._setupAnims(0);\n    this._esc = (e) => { if (e.key === 'Escape') { if (this.state.openWO) this.setState({ openWO:null, menuOpen:false }); if (this.state.openPermit) this.setState({ openPermit:null }); if (this.state.openProblem) this.setState({ openProblem:false }); } };\n    window.addEventListener('keydown', this._esc);\n  }\n  componentWillUnmount(){ if (this._esc) window.removeEventListener('keydown', this._esc); }\n  _setupAnims(tries){\n    const root = document.getElementById('h');\n    const src = root && root.querySelector('[data-cc=\"scramble-src\"]');\n    if (!root || !src) { if (tries < 40) setTimeout(() => this._setupAnims(tries + 1), 80); return; }\n    let last = null;\n    const fire = () => {\n      window.__runAnims = (window.__runAnims || 0) + 1;\n      const gen = (this._gen = (this._gen || 0) + 1);\n      requestAnimationFrame(() => {\n        if (gen !== this._gen) return;\n        this._scramble(root, gen);\n        this._countUp(root, gen);\n        this._draw(root, gen);\n        this._grow(root, gen);\n      });\n    };\n    const obs = new MutationObserver(() => { const t = src.textContent; if (t !== last) { last = t; fire(); } });\n    obs.observe(src, { childList: true, characterData: true, subtree: true });\n    last = src.textContent;\n    fire();\n  }\n  _countUp(root, gen){\n    const ease = t => 1 - Math.pow(1 - t, 3);\n    root.querySelectorAll('[data-cc=\"count\"]').forEach((el, k) => {\n      const raw = (el.getAttribute('data-cc-target') || el.textContent || '').trim();\n      const m = raw.match(/^(\\D*?)([\\d,]*\\.?\\d+)(\\D*)$/);\n      if (!m) return;\n      if (!el.hasAttribute('data-cc-target')) el.setAttribute('data-cc-target', raw);\n      const prefix = m[1], numStr = m[2], suffix = m[3];\n      const hasComma = numStr.indexOf(',') >= 0;\n      const decimals = (numStr.split('.')[1] || '').length;\n      const target = parseFloat(numStr.replace(/,/g, ''));\n      const dur = 760, t0 = performance.now() + Math.min(k * 40, 320);\n      const fmt = v => {\n        let s = decimals > 0 ? v.toFixed(decimals) : String(Math
